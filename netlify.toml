[[plugins]]
package = "netlify-plugin-flutter"

  [plugins.inputs]
  channel = "stable"

[build]
command = "flutter build web --release"
publish = "build/web"

# Legal pages: clean URLs (copy docs/*.html legal pages into publish root)
[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/terms-of-service"
  to = "/terms-of-service.html"
  status = 200

[[redirects]]
  from = "/delete-account"
  to = "/delete-account.html"
  status = 200

[[redirects]]
  from = "/delete-account.html"
  to = "/delete-account"
  status = 301

[[redirects]]
  from = "/privacy-policy.html"
  to = "/privacy-policy"
  status = 301

[[redirects]]
  from = "/terms-of-service.html"
  to = "/terms-of-service"
  status = 301

# SPA fallback: serve index.html for client-side routes (e.g. /payment-return)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
