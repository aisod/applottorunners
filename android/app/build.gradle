plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load local.properties so we can keep API keys out of source control
def localProps = new Properties()
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { stream -> localProps.load(stream) }
}

// Load key.properties for release signing
def keyPropsFile = rootProject.file("key.properties")
def keyProps = new Properties()
if (keyPropsFile.exists()) {
    keyPropsFile.withInputStream { stream -> keyProps.load(stream) }
}

android {
    namespace = "com.mycompany.LottoRunners"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    signingConfigs {
        debug {
            // Use default debug keys
        }
        release {
            keyAlias     = keyProps['keyAlias']
            keyPassword  = keyProps['keyPassword']
            storeFile    = keyProps['storeFile'] ? file("${projectDir}/${keyProps['storeFile']}") : null
            storePassword = keyProps['storePassword']
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
        // Enable core library desugaring for newer APIs
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "21"
    }

    defaultConfig {
        applicationId = "com.mycompany.LottoRunners"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Provide Google Maps API key to the manifest via placeholder.
        manifestPlaceholders["GOOGLE_MAPS_API_KEY"] =
                localProps.getProperty("GOOGLE_MAPS_API_KEY", "")

        // Mapbox public access token — read from gradle.properties (not committed).
        // Falls back to local.properties, then to empty string if neither is set.
        def mbxToken = project.findProperty("MAPBOX_ACCESS_TOKEN")
                ?: localProps.getProperty("MAPBOX_ACCESS_TOKEN", "")
        resValue "string", "mapbox_access_token", mbxToken
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }

    packaging {
        doNotStrip "**/*.so"
    }
}


flutter {
    source = "../.."
}

dependencies {
    // Core library desugaring for newer APIs
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'androidx.appcompat:appcompat:1.3.1'
    implementation 'com.google.android.material:material:1.4.0'
}

// LeakCanary (bundled in flutter_mapbox_navigation) crashes on Android 14+ (targetSdk 34+)
// because it calls registerReceiver() without RECEIVER_EXPORTED/RECEIVER_NOT_EXPORTED flags.
// It is a debug-only tool and should not be in the final build.
configurations.all {
    exclude group: 'com.squareup.leakcanary', module: 'leakcanary-android'
    exclude group: 'com.squareup.leakcanary', module: 'leakcanary-android-process'
}
